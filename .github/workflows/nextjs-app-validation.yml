name: Validate Next.js App (CI only)

on:
  push:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "firebase.ts"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - ".eslintrc.json"
      - "postcss.config.mjs"
      - "next-env.d.ts"
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "firebase.ts"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - ".eslintrc.json"
      - "postcss.config.mjs"
      - "next-env.d.ts"

jobs:
  validate-nextjs-app:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Next.js app
        run: npm run validate:app
