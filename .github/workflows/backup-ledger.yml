name: Backup Ledger

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup-ledger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FIRESTORE_BACKUP_BUCKET: ${{ secrets.FIRESTORE_BACKUP_BUCKET }}
      FIRESTORE_BACKUP_PREFIX: ${{ secrets.FIRESTORE_BACKUP_PREFIX }}
      STORAGE_BACKUP_BUCKET: ${{ secrets.STORAGE_BACKUP_BUCKET }}
      STORAGE_INVENTORY_PREFIX: ${{ secrets.STORAGE_INVENTORY_PREFIX }}
      FIREBASE_PROJECT_ID: nanny-tech
      BACKUP_LEDGER_COLLECTION: backupRuns
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}
      - run: node scripts/backup/generate_ledger.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backup-ledger
          path: artifacts/backup-ledger/*
