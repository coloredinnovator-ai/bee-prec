name: CodeQL
on:
  push:
    branches: [main, MAROON-staging]
  pull_request:
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    uses: github/codeql-action/.github/workflows/codeql.yml@v4
    with:
      languages: javascript
      queries: security-extended
