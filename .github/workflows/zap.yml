name: ZAP Baseline Scan
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL'
        required: false
        default: 'https://bee-prec-site.web.app'

jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - name: ZAP baseline
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || vars.BEE_PREC_PROD_URL || 'https://bee-prec-site.web.app' }}
          rules_file_name: ignore.rules
          cmd_options: '-a'
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-baseline-report.html
