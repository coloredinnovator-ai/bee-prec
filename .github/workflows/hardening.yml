name: BEE COOP Hardening

on:
  push:
    branches: [main, MAROON-staging]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install repo dependencies
        run: npm ci
      - name: Install pinned Playwright browser toolchain
        run: |
          npx playwright install --with-deps chromium
      - name: Smoke prod/staging
        env:
          PROD_URL: https://bee-prec-site.web.app
          STAGE_URL: https://bee-prec-site-staging.web.app
        run: |
          cat > smoke.spec.mjs <<'SCRIPT'
          import { expect, test } from '@playwright/test';

          const targets = [
            { name: 'prod', url: process.env.PROD_URL },
            { name: 'staging', url: process.env.STAGE_URL },
          ];

          for (const target of targets) {
            test(`BEE COOP smoke ${target.name}`, async ({ page }) => {
              await page.goto(target.url, { waitUntil: 'networkidle', timeout: 45000 });
              await expect(page.locator('body')).toContainText('BEE COOP');
              await page.locator('text=Clinic').first().click({ timeout: 5000 }).catch(() => {});
              await page.waitForTimeout(500);
              await page.screenshot({ path: `smoke-${target.name}.png`, fullPage: true });
            });
          }
          SCRIPT
          npx playwright test smoke.spec.mjs --reporter=line
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-screens
          path: smoke-*.png

  firestore-health:
    needs: playwright-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install repo dependencies
        run: npm ci
      - name: Write/read Firestore health doc
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          node <<'SCRIPT'
          const admin = require('firebase-admin');
          const sa = require(process.env.GOOGLE_APPLICATION_CREDENTIALS);
          admin.initializeApp({ credential: admin.credential.cert(sa) });
          const db = admin.firestore();
          const ref = db.collection('healthchecks').doc('automation');
          const now = admin.firestore.Timestamp.now();
          async function run() {
            await ref.set({ updatedAt: now, msg: 'hardening', ok: true }, { merge: true });
            const snap = await ref.get();
            if (!snap.exists) throw new Error('Health doc missing');
          }
          run().then(()=>process.exit(0)).catch((e)=>{console.error(e); process.exit(1);});
          SCRIPT

  uptime-curl:
    needs: playwright-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Curl prod
        run: |
          set -euo pipefail
          resp=$(curl -sS -w '\nHTTP:%{http_code}' https://bee-prec-site.web.app)
          code=$(echo "$resp" | tail -n1 | sed 's/HTTP://')
          body=$(echo "$resp" | head -n -1)
          if [ "$code" != "200" ]; then echo "Bad status $code"; exit 1; fi
          echo "$body" | grep -q "BEE COOP" || (echo "Marker missing"; exit 1)
