name: Redteam Health
on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping-prod-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Curl prod
        run: |
          set -euo pipefail
          for url in https://bee-prec-site.web.app https://bee-prec-site-staging.web.app; do
            resp=$(curl -sS -w '\nHTTP:%{http_code}' "$url")
            code=$(echo "$resp" | tail -n1 | sed 's/HTTP://')
            body=$(echo "$resp" | head -n -1)
            if [ "$code" != "200" ]; then echo "Bad status $code for $url"; exit 1; fi
            echo "$body" | grep -q "BEE COOP" || (echo "Marker missing for $url"; exit 1)
          done

  firestore-probe:
    needs: ping-prod-staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Write/read probe
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm exec --yes --package=firebase-admin@13.7.0 -- node <<'SCRIPT'
          const admin = require('firebase-admin');
          const sa = require(process.env.GOOGLE_APPLICATION_CREDENTIALS);
          admin.initializeApp({ credential: admin.credential.cert(sa) });
          const db = admin.firestore();
          const ref = db.collection('healthchecks').doc('redteam');
          const ts = admin.firestore.Timestamp.now();
          async function run(){
            await ref.set({ updatedAt: ts, msg: 'redteam', ok: true }, { merge: true });
            const snap = await ref.get();
            if (!snap.exists) throw new Error('health doc missing');
          }
          run().then(()=>process.exit(0)).catch((e)=>{console.error(e); process.exit(1);});
          SCRIPT
