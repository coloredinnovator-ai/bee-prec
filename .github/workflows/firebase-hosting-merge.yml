name: Deploy to Firebase Hosting
permissions:
  contents: read
  id-token: write
  pull-requests: read
on:
  push:
    branches:
      - main
      - MAROON-staging
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch/environment to deploy"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - MAROON-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', matrix.branch)) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == matrix.branch)
    defaults:
      run:
        working-directory: bee-prec-app
    environment:
      name: ${{ matrix.branch == 'main' && 'production' || 'staging' }}
      url: ${{ matrix.target == 'bee-prec-site' && 'https://bee-prec-site.web.app' || 'https://bee-prec-site-staging.web.app' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: main
            channelId: live
            target: bee-prec-site
          - branch: MAROON-staging
            channelId: live
            target: bee-prec-site-staging
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies and build Flutter web
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter build web --release

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'
          channelId: ${{ matrix.channelId }}
          projectId: nanny-tech
          target: ${{ matrix.target }}
