name: Deploy to Firebase Hosting
permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - MAROON-staging
    paths:
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-merge.yml"
      - "firestore.rules"
      - "storage.rules"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch/environment to deploy"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - MAROON-staging

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'main')
    defaults:
      run:
        working-directory: .
    environment:
      name: production
      url: https://bee-prec-site.web.app
    steps:
      - uses: actions/checkout@v4
      - name: Validate static web assets
        run: test -f public/index.html && test -f public/app.js

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'
          channelId: live
          projectId: nanny-tech
          target: bee-prec-site

      - name: Deploy backend security rules
        run: |
          printf '%s\n' "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}" > "${RUNNER_TEMP}/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase-sa.json"
          npm install -g firebase-tools@13
          firebase deploy --project nanny-tech --only firestore:rules,storage:rules --non-interactive
          rm -f "${RUNNER_TEMP}/firebase-sa.json"

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: (github.event_name == 'push' && github.ref == 'refs/heads/MAROON-staging') || (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'MAROON-staging')
    defaults:
      run:
        working-directory: .
    environment:
      name: staging
      url: https://bee-prec-site-staging.web.app
    steps:
      - uses: actions/checkout@v4
      - name: Validate static web assets
        run: test -f public/index.html && test -f public/app.js

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'
          channelId: live
          projectId: nanny-tech
          target: bee-prec-site-staging

      - name: Deploy backend security rules
        run: |
          printf '%s\n' "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}" > "${RUNNER_TEMP}/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase-sa.json"
          npm install -g firebase-tools@13
          firebase deploy --project nanny-tech --only firestore:rules,storage:rules --non-interactive
          rm -f "${RUNNER_TEMP}/firebase-sa.json"
