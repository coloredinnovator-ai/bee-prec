name: Deploy to Firebase Hosting
permissions:
  contents: read
  id-token: write
  pull-requests: read
on:
  push:
    branches:
      - main
      - MAROON-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: bee-prec-app
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: main
            channelId: live
            target: bee-prec-site
          - branch: MAROON-staging
            channelId: live
            target: bee-prec-site-staging
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies and build Flutter web
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter build web --release

      - name: Deploy Firebase Hosting
        if: |
          github.ref == format('refs/heads/{0}', matrix.branch)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'
          channelId: ${{ matrix.channelId }}
          projectId: nanny-tech
          target: ${{ matrix.target }}
