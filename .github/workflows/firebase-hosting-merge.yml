name: Deploy Static Site to Firebase Hosting
permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - MAROON-staging
    paths:
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-merge.yml"
      - "firestore.rules"
      - "storage.rules"
  workflow_dispatch:

jobs:
  resolve-release-context:
    runs-on: ubuntu-latest
    outputs:
      environment_name: ${{ steps.resolve.outputs.environment_name }}
      environment_url: ${{ steps.resolve.outputs.environment_url }}
      hosting_target: ${{ steps.resolve.outputs.hosting_target }}
    steps:
      - name: Resolve deployable ref
        id: resolve
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            main)
              echo "environment_name=production" >> "${GITHUB_OUTPUT}"
              echo "environment_url=https://bee-prec-site.web.app" >> "${GITHUB_OUTPUT}"
              echo "hosting_target=bee-prec-site" >> "${GITHUB_OUTPUT}"
              ;;
            MAROON-staging)
              echo "environment_name=staging" >> "${GITHUB_OUTPUT}"
              echo "environment_url=https://bee-prec-site-staging.web.app" >> "${GITHUB_OUTPUT}"
              echo "hosting_target=bee-prec-site-staging" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Manual deploys are only supported from main or MAROON-staging. Current ref: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

  deploy:
    needs: resolve-release-context
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.resolve-release-context.result == 'success'
    defaults:
      run:
        working-directory: .
    environment:
      name: ${{ needs.resolve-release-context.outputs.environment_name }}
      url: ${{ needs.resolve-release-context.outputs.environment_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate static web assets
        run: test -f public/index.html && test -f public/site.js

      - name: Authenticate to GCP for rules deploy
        id: deploy-rules-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'

      - name: Deploy backend security rules before hosting
        run: |
          set -euo pipefail
          export GOOGLE_APPLICATION_CREDENTIALS="${{ steps.deploy-rules-auth.outputs.credentials_file_path }}"
          npx firebase-tools@15.0.0 deploy --project nanny-tech --only firestore:rules,storage --non-interactive

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'
          channelId: live
          projectId: nanny-tech
          target: ${{ needs.resolve-release-context.outputs.hosting_target }}
