name: Deploy Static Site to Firebase Hosting
permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - MAROON-staging
    paths:
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-merge.yml"
      - "firestore.rules"
      - "storage.rules"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch/environment to deploy"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - MAROON-staging

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'main')
    defaults:
      run:
        working-directory: .
    environment:
      name: production
      url: https://bee-prec-site.web.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate static web assets
        run: test -f public/index.html && test -f public/site.js

      - name: Authenticate to GCP for rules deploy
        id: deploy-rules-auth-main
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'

      - name: Deploy backend security rules before hosting
        run: |
          set -euo pipefail
          export GOOGLE_APPLICATION_CREDENTIALS="${{ steps.deploy-rules-auth-main.outputs.credentials_file_path }}"
          npm install -g firebase-tools
          npx firebase-tools deploy --project nanny-tech --only firestore:rules,storage --non-interactive

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'
          channelId: live
          projectId: nanny-tech
          target: bee-prec-site

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: (github.event_name == 'push' && github.ref == 'refs/heads/MAROON-staging') || (github.event_name == 'workflow_dispatch' && github.event.inputs.branch == 'MAROON-staging')
    defaults:
      run:
        working-directory: .
    environment:
      name: staging
      url: https://bee-prec-site-staging.web.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate static web assets
        run: test -f public/index.html && test -f public/site.js

      - name: Authenticate to GCP for rules deploy
        id: deploy-rules-auth-staging
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'

      - name: Deploy backend security rules before hosting
        run: |
          set -euo pipefail
          export GOOGLE_APPLICATION_CREDENTIALS="${{ steps.deploy-rules-auth-staging.outputs.credentials_file_path }}"
          npm install -g firebase-tools
          npx firebase-tools deploy --project nanny-tech --only firestore:rules,storage --non-interactive

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NANNY_TECH }}'
          channelId: live
          projectId: nanny-tech
          target: bee-prec-site-staging
