name: Bug report
description: Capture a defect with operational impact and reproduction detail.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and the affected route or flow.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, data, account role, and environment.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: User impact, data risk, and whether backup or audit evidence is involved.
    validations:
      required: true
