<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bee-Prec</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --text: #101318;
        --accent: #0d6efd;
        --card: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #eaf0ff 0%, var(--bg) 55%);
      }
      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .card {
        width: min(760px, 94vw);
        background: var(--card);
        border-radius: 18px;
        border: 1px solid #e2e6f2;
        box-shadow: 0 12px 40px rgba(17, 27, 58, 0.08);
        padding: 2.2rem;
      }
      h1 {
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0.45rem 0;
        line-height: 1.6;
      }
      .meta {
        margin-top: 1.25rem;
        padding: 1rem;
        border-radius: 12px;
        background: #f8faff;
        border: 1px dashed #ced6ea;
      }
      .pill {
        display: inline-block;
        margin-top: 0.75rem;
        background: #eef4ff;
        color: #173f9e;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>Bee-Prec</h1>
        <p>Production and staging environments are now isolated in separate Firebase Hosting targets and driven by branch-specific GitHub Actions.</p>
        <p>Configured for: <strong>GitHub</strong> + <strong>GCP</strong> + <strong>Firebase</strong>.</p>
        <div class="meta">
          <strong>Deployment targets</strong>
          <div class="pill">main → bee-prec-site</div>
          <div class="pill">MAROON-staging → bee-prec-site-staging</div>
        </div>
      </section>
    </main>
  </body>
</html>
